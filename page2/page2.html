<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>賣場管理</title>
  <link href="../css/page2.css" rel="stylesheet" type="text/css" />
  
</head>
<body>
  <header class="main-header">
    <div class="nav-container">
      <img class="logo" src="../image/logo.png" alt="Store Logo" />
      <nav class="main-nav">
        <a href="../index/index.html" class="nav-link">首頁</a>
        <a href="../page4/page4.html" class="nav-link">關於我們</a>
        <a href="../page1/page1.html" class="nav-link">商品頁</a>
        <a href="../page3/page3.html" class="nav-link">購物車</a>
        <a href="page2.html" class="nav-link">賣場管理</a>
      </nav>
    </div>
  </header>

  <!-- 登入區塊 -->
  <div id="loginContainer">
    <h2>🔐 請先登入</h2>
    <div class="login-box">
      <input type="text" id="username" placeholder="首次登入帳號:mystore" />
      <br />
      <input type="password" id="password" placeholder="首次登入密碼:412410077" />
      <br />
      <button onclick="checkLogin()">登入</button>
      <button id="resetAdminAccountBtn" type="button" style="margin-left: 10px;">還原預設帳號密碼</button>
    </div>
  </div>

  <!-- 管理區塊（預設隱藏） -->
  <div id="adminSection" style="display:none;">
    <button id="logoutBtn" style="display:none; margin-left: 10px;">登出</button>

    <div id="accountSettings" style="display:none; margin-top:30px;">
      <h2>修改帳號密碼</h2>
      <form id="accountForm">
        <label>舊密碼：<input type="password" id="oldPassword" required /></label><br />
        <label>新帳號：<input type="text" id="newUsername" required /></label><br />
        <label>新密碼：<input type="password" id="newPassword" required /></label><br />
        <button type="submit">儲存修改</button>
      </form>
    </div>

    <div id="logoChangeSection">
  <h2>更換 Logo</h2>
  <input type="file" id="logoFileInput" accept="image/*" />
  <button id="changeLogoBtn">更換 Logo</button>
  <button id="resetLogoBtn" >還原預設Logo</button>
</div>
    <h1>新增商品</h1>
    <form id="addProductForm">
      <label>商品名稱：<input type="text" id="productName" required /></label><br />
      <label>價格：<input type="number" id="productPrice" required min="0" /></label><br />
      <label>圖片上傳：<input type="file" id="productImageFile" accept="image/*" /></label><br />
      <button type="submit">新增商品</button>
    </form>

    <hr />

    <h1>商品列表</h1>
    <div id="productButtonsContainer">
  <button id="clearBtn">清空所有商品</button>
  <button id="restoreDefaultBtn">還原為預設商品</button>
</div>
    
    <div id="noResult" style="display:none;">目前沒有任何商品</div>
    <div id="productGrid"></div>
  </div>

  <section id="aboutSection" >
    <h2>修改「關於我們」</h2>
    <textarea id="aboutContent" rows="10" style="width: 100%;"></textarea>
    <br />
    <button id="saveAboutBtn">儲存修改</button>
    <button id="resetAboutBtn">還原為預設</button>
  </section>

  <footer class="conpyright">
    &copy; 2025 My Store 賣場 - 淡江大學資訊系統專題製作
  </footer>

  <script src="../js/setProducts.js"></script>
  <script src="../js/page2.js"></script>
</body>
</html>
